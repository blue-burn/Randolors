app-id: io.github.blue_burn.randolors
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.python3
command: randomcolors

build-options:
  append-path: /usr/lib/sdk/python3/bin

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

modules:
  - name: pygame
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation pygame
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/p/pygame/pygame-2.6.1.tar.gz
        sha256: 56fb02ead529cee00d415c3e007f75e0780c655909aaa8e8bf616ee09c9feb1f

  - name: randolors
    buildsystem: simple
    build-commands:
      - install -Dm755 randomcolors.py /app/bin/randomcolors
      - install -Dm644 io.github.blue_burn.randolors.desktop /app/share/applications/io.github.blue_burn.randolors.desktop
      - install -Dm644 io.github.blue_burn.randolors.metainfo.xml /app/share/metainfo/io.github.blue_burn.randolors.metainfo.xml
      - install -Dm644 io.github.blue_burn.randolors.png /app/share/icons/hicolor/128x128/apps/io.github.blue_burn.randolors.png
    sources:
      - type: file
        path: randomcolors.py
      - type: file
        path: io.github.blue_burn.randolors.desktop
      - type: file
        path: io.github.blue_burn.randolors.metainfo.xml
      - type: file
        path: io.github.blue_burn.randolors.png
